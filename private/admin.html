<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/admin.css">
</head>

<body id="bodyAdmin">
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p>Επεξεργασία δεδομένων, παρακαλώ περιμένετε...</p>
    </div>

    <header>
        <img id="logo" src="../images/logo_unipi.svg"></img>

    </header>

    <div class="adminWrapper">

        <div class="fileContainer">

            <div class="fileBox">
                <h2>Ακαδημαϊκό Ημερολόγιο</h2>
                <input type="file" name="acCal" required>
                <button type="submit">Ανέβασμα</button>
            </div>

            <div class="fileBox">
                <h2>Πρόγραμμα Εξαμήνου</h2>
                <input type="file" name="schedule" required>
                <button type="submit">Ανέβασμα</button>
            </div>

            <div class="fileBox">
                <h2>Πρόγραμμα Εργαστηρίων</h2>
                <input type="file" name="labs" required>
                <button type="submit">Ανέβασμα</button>
            </div>
        </div>

        <div class="editBox">
            <button type="button" id="editButton">
                <h3>Επεξεργασία Ωρολόγιου Προγράμματος</h3>
            </button>
        </div>

    </div>


    <div id="selectWrapper">

        <div id="selectSemester">

            <label for="semester"> <h1>Επέλεξε Εξάμηνο:</h1> </label>

            <select name="semesters" id="semester">
                <option disabled selected>Επέλεξε Εξάμηνο:</option> 
                <option>Εξάμηνο 1</option>
                <option>Εξάμηνο 2</option>
                <option>Εξάμηνο 3</option>
                <option>Εξάμηνο 4</option>
                <option>Εξάμηνο 5</option>
                <option>Εξάμηνο 6</option>
                <option>Εξάμηνο 7</option>
                <option>Εξάμηνο 8</option>
            </select>

        </div>

        <div id="selectCourse">

            <label for="courses"> <h1>Επέλεξε Μάθημα:</h1> </label>

            <select id="courses">    
            </select>

        </div>

    </div>

    <div id="editWrapper">

        <div id="editCourse">

            <h2>Επεξεργασία Μαθήματος</h2>
    
            <form id="courseForm">
                <label id="title">Όνομα Μαθήματος: <input type="text" id="titleInput"></label><br>
                <label id="lectureHall">Αμφιθέατρο: <input type="text" id="lectureHallInput"></label><br>
                <label id="daysOfWeek">Ημέρες Μαθήματος: <input type="text" id="daysOfWeekInput"></label><br>
                <label id="startTime">Ώρα Έναρξης: <input type="time" id="startTimeInput"></label><br>
                <label id="endTime">Ώρα Λήξης: <input type="time" id="endTimeInput"></label><br>
                <label id="Semesters">Εξάμηνο: <input type="text" id="semestersInput"></label><br>
                <label id="professor">Καθηγητές: <input type="text" id="professorInput"></label><br>
                <button type="submit">Αποθήκευση</button>
            </form>
    
        </div>

    </div>

    <script src="/secure-admin-script.js"></script>

</body>

</html>
