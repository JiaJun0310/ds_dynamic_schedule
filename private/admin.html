<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="/admin-css.css">
</head>

<body id="bodyAdmin">
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p>Επεξεργασία δεδομένων, παρακαλώ περιμένετε...</p>
    </div>

    <header>
        <img id="logo" src="../images/logo_unipi.svg"></img>

    </header>

    <!-- div that includes the upload of the files -->
    <div class="adminWrapper">

        <div class="fileContainer">

            <div class="fileBox">
                <h2>Ακαδημαϊκό Ημερολόγιο</h2>
                <input type="file" name="acCal" accept=".pdf" required>
                <button type="submit">Ανέβασμα</button>
            </div>

            <div class="fileBox">
                <h2>Πρόγραμμα Εξαμήνου</h2>
                <input type="file" name="schedule" accept=".pdf" required>
                <button type="submit">Ανέβασμα</button>
            </div>

            <div class="fileBox">
                <h2>Πρόγραμμα Εργαστηρίων</h2>
                <input type="file" name="labs" accept=".xls, .xlsx" required>
                <button type="submit">Ανέβασμα</button>
            </div>

            <div class="fileBox">
                <h2>Πρόγραμμα Εξεταστικής</h2>
                <input type="file" name="exams" accept=".pdf" required>
                <button type="submit">Ανέβασμα</button>
            </div>
        </div>

    </div>

    <!-- div that includes the two buttons for the edit of the program and the exam -->
    <div class="editButtonWrapper">

        <div class="editBox">
            <button type="button" id="editAcademicCalendar">
                <h3>Επεξεργασία Ακαδημαϊκού Ημερολογίου</h3>
            </button>
        </div>

        <div class="editBox">
            <button type="button" id="editProgramButton">
                <h3>Επεξεργασία Ωρολόγιου Προγράμματος</h3>
            </button>
        </div>
    
        <div class="editBox">
            <button type="button" id="editExamButton">
                <h3>Επεξεργασία Προγράμματος Εξεταστικής</h3>
            </button>
        </div>

        <div class="editBox">
            <button type="button" id="editLabButton">
                <h3>Επεξεργασία Προγράμματος Εργαστηρίων</h3>
            </button>
        </div>

    </div>


    <!-- div that includes the drop down boxes for the selection of semester and course for the program-->
    <div id="programSelectWrapper">

        <button type="button" id="backButton">
            <h3>Πίσω</h3>
        </button>

        <div id="programSelectSemester">

            <label for="programSemester"> <h1>Επέλεξε Εξάμηνο:</h1> </label>

            <select name="semesters" id="programSemester">
                <option autocomplete="off" disabled selected>Επέλεξε Εξάμηνο:</option> 
                <option>Εξάμηνο 1</option>
                <option>Εξάμηνο 2</option>
                <option>Εξάμηνο 3</option>
                <option>Εξάμηνο 4</option>
                <option>Εξάμηνο 5</option>
                <option>Εξάμηνο 6</option>
                <option>Εξάμηνο 7</option>
                <option>Εξάμηνο 8</option>
            </select>

        </div>

        <div id="selectCourse">

            <label for="courses"> <h1>Επέλεξε Μάθημα:</h1> </label>

            <select id="courses">    
            </select>

        </div>

    </div>

    <!-- div that contains the edit of the course that is created dynamically in js -->
    <div id="editWrapper">

    </div>


    <!-- div that includes the drop down boxes for the selection of semester and course of the exams-->
    <div id="examsSelectWrapper">

        <button type="button" id="examsBackButton">
            <h3>Πίσω</h3>
        </button>

        <div id="examsSelectSemester">

            <label for="examsSemester"> <h1>Επέλεξε Εξάμηνο:</h1> </label>

            <select name="semesters" id="examsSemester">
                <option autocomplete="off" disabled selected>Επέλεξε Εξάμηνο:</option> 
                <option>Εξάμηνο 1</option>
                <option>Εξάμηνο 2</option>
                <option>Εξάμηνο 3</option>
                <option>Εξάμηνο 4</option>
                <option>Εξάμηνο 5</option>
                <option>Εξάμηνο 6</option>
                <option>Εξάμηνο 7</option>
                <option>Εξάμηνο 8</option>
            </select>

        </div>

        <div id="examsSelectCourse">

            <label for="courses"> <h1>Επέλεξε Μάθημα:</h1> </label>

            <select id="examsCourses">    
            </select>

        </div>

    </div>

    <!-- div that contains the edit of the exam that is created dynamically in js -->
    <div id="examsEditWrapper">

    </div>


    <!-- div that includes the drop down boxes for the selection of semester and course of the labs-->
    <div id="labsSelectWrapper">

        <button type="button" id="labsBackButton">
            <h3>Πίσω</h3>
        </button>

        <div id="labsSelectSemester">

            <label for="labsSemester"> <h1>Επέλεξε Εξάμηνο:</h1> </label>

            <select name="semesters" id="labsSemester">
                <option autocomplete="off" disabled selected>Επέλεξε Εξάμηνο:</option> 
                <option>Εξάμηνο 1</option>
                <option>Εξάμηνο 2</option>
                <option>Εξάμηνο 3</option>
                <option>Εξάμηνο 4</option>
                <option>Εξάμηνο 5</option>
                <option>Εξάμηνο 6</option>
                <option>Εξάμηνο 7</option>
                <option>Εξάμηνο 8</option>
            </select>

        </div>

        <div id="labsSelectCourse">

            <label for="courses"> <h1>Επέλεξε Μάθημα:</h1> </label>

            <select id="labsCourses">    
            </select>

        </div>

    </div>

    <!-- div that contains the edit of the labs that is created dynamically in js -->
    <div id="labsEditWrapper">

    </div>


    <!-- div that includes the back button and the edit wrapper for the academic calendar -->
    <div id="AcademicCalendarWrapper">

        <button type="button" id="AcademicCalendarBackButton">
            <h3>Πίσω</h3>
        </button>

         <!-- div that contains the edit of the academic calendar that is created dynamically in js -->
        <div id="AcademicCalendarEditWrapper">

        </div>

    </div>

    <script src="/secure-admin-script.js"></script>

</body>

</html>
