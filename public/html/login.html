<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/login.css">
    <title>Document</title>
</head>
<body>

    <header>
        <a href="https://www.ds.unipi.gr/">
            <img id="logo" src="../images/logo_unipi.svg" ></img>
        </a>   

    </header>

        <div class = 'loginWrapper'>
            <div class = 'loginBox'>
                <h1>Σύνδεση ως Διαχειριστής</h1>
                <form id="loginForm">
                    <label for="username">
                        <img src="../images/username.svg" width="18" height="18">
                        Όνομα Χρήστη:
                    </label><br>
                    <input type="text" id="username" name="username" style="border-radius: 8px; width:310px; height: 50px;" required><br><br>

                    <label for="password">
                        <img src="../images/password.svg" width="18" height="18">
                        Κωδικός:
                    </label><br>
                    <input type="password" id="password" name="password" style="border-radius: 8px; width: 310px; height: 50px;" required><br><br>
                    
                    <input type="submit" value="Σύνδεση" class='bottomButtons' style="background-color: #8c2635; color: white; cursor: pointer;">
                </form>
            </div>
        </div>
    <script src="../login.js"></script>
</body>
</html>
