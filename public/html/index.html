<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <!-- <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css' rel='stylesheet'> -->
    <!-- <link href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css' rel='stylesheet'> -->
</head>


<body>


    <!-- This is the top section of the website (logo and potentially nav bar) -->
    <header>
        <a href="https://www.ds.unipi.gr/">
            <img id="logo" src="../images/logo_unipi.svg"></img>
        </a>
    </header>

    <!-- Main section of the page (schedule and course selection) -->
    <main>
        <div id='wrapper'>

            <div id='calendar'>
                <dialog id="eventPopup"
                    style="font-family: sans-serif; color: #ffffff; background-color: #2f385f; border: 3px solid #191e38; border-radius: 8px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 300px;">
                    <h3 id="popTitle" style="margin-top: 0; color: #eee;"></h3>
                    <p><strong>Καθηγητής:</strong> <span id="popProfessor"></span></p>
                    <p><strong>Αίθουσα:</strong> <span id="popHall"></span></p>
                    <p><strong>Ώρα:</strong> <span id="popTime"></span></p>
                    <div style="display: flex;">
                        <button onclick="document.getElementById('eventPopup').close()"
                            style="font: sans-serif; cursor: pointer; background: #eee; border: 1px solid #ccc; padding: 5px 10px; border-radius: 4px;">Κλείσιμο</button>

                        <button onclick="document.getElementById('eventPopup').close()" id="colorBtn" style="background: none; border: none; cursor: pointer; 
                   display: flex; align-items: center; justify-content: center; 
                   width: 35px; height: 35px; min-width: 35px; min-height: 35px; 
                   flex-shrink: 0; padding: 0;">
                            <img src="../images/color.svg" alt="icon"
                                style="width: 22px; height: 22px; display: block; pointer-events: none;">
                        </button>
                        <input type="color" id="hiddenPicker" style="display: none;">
                    </div>


                </dialog>
            </div>
            <div id="semesterWrapper">

                <div id="radioBox">

                    <label>
                        <input type="radio" name="choice" value="Μαθήματα" checked> ΜΑΘΗΜΑΤΑ
                    </label>
    
                    <label>
                        <input type="radio" name="choice" value="Εργαστήρια"> ΕΡΓΑΣΤΗΡΙΑ
                    </label>
    
                    <label>
                        <input type="radio" name="choice" value="Εξεταστική"> ΕΞΕΤΑΣΤΙΚΗ
                    </label>

                </div>

                <div id='semesters'>

                    <div class="buttonDiv">
                        <p class="semesterButtons">Εξάμηνο 1</p>
                        <img class="pointer" src="../images/right_pointer.svg"></img>
                    </div>
                    <div id="Semester1"></div>
                    <div class="buttonDiv">
                        <p class="semesterButtons">Εξάμηνο 2</p>
                        <img class="pointer" src="../images/right_pointer.svg"></img>
                    </div>
                    <div id="Semester2"></div>
                    <div class="buttonDiv">
                        <p class="semesterButtons">Εξάμηνο 3</p>
                        <img class="pointer" src="../images/right_pointer.svg"></img>
                    </div>
                    <div id="Semester3"></div>
                    <div class="buttonDiv">
                        <p class="semesterButtons">Εξάμηνο 4</p>
                        <img class="pointer" src="../images/right_pointer.svg"></img>
                    </div>
                    <div id="Semester4"></div>
                    <div class="buttonDiv">
                        <p class="semesterButtons">Εξάμηνο 5</p>
                        <img class="pointer" src="../images/right_pointer.svg"></img>
                    </div>
                    <div id="Semester5"></div>
                    <div class="buttonDiv">
                        <p class="semesterButtons">Εξάμηνο 6</p>
                        <img class="pointer" src="../images/right_pointer.svg"></img>
                    </div>
                    <div id="Semester6"></div>
                    <div class="buttonDiv">
                        <p class="semesterButtons">Εξάμηνο 7</p>
                        <img class="pointer" src="../images/right_pointer.svg"></img>
                    </div>
                    <div id="Semester7"></div>
                    <div class="buttonDiv">
                        <p class="semesterButtons">Εξάμηνο 8</p>
                        <img class="pointer" src="../images/right_pointer.svg"></img>
                    </div>
                    <div id="Semester8"></div>

                </div>
                <div id="clearDiv">
                    <button id="toggleScreen" class="bottomButtons">Αλλαγη Οθονης</button>
                    <button id="clearSelection" class="bottomButtons">Εκκαθαριση Επιλογων</button>
                </div>
            </div>
        </div>



        <!-- script for the calendar -->
        <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
        <script src="https://rawcdn.githack.com/nwcell/ics.js/master/ics.deps.min.js"></script>
        <script src="../calendar.js"></script>
        <!-- <script src='fullcalendar/dist/index.global.js'></script> -->

    </main>

    <!-- Bottom part of the website (possibly credits? and additional information)-->
    <footer>
        <p class="disclaimer">Τυχόν απρόοπτες αλλαγές στο πρόγραμμα δεν συμπεριλαμβάνονται στην ιστοσελίδα. Δείτε τις <a
                class="announcements" href="https://www.ds.unipi.gr/announcements/">ανακοινώσεις</a> της σχολής.</p>
    </footer>

</body>

</html>
